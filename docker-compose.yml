version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sistema_etl_postgres
    environment:
      POSTGRES_USER: etl_user
      POSTGRES_PASSWORD: etl_password
      POSTGRES_DB: etl_metadata
    ports:
      - "5432:5432"
    volumes:
      - etl_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl_user -d etl_metadata"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  etl_postgres_data:
